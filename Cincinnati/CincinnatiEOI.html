              const d = String(date.getDate()).padStart(2, "0");
              const m = String(date.getMonth() + 1).padStart(2, "0");
              const y = date.getFullYear();
              return `${m}/${d}/${y}`;
            },
            parse(dateString) {
              if (!dateString) return null;
              const [m, d, y] = dateString.split("/");
              return new Date(y, m - 1, d);
            },
            onSelect: function () {
              dateInput.value = this.toString();

            onClose: function () {

            isaoaHidden: document.getElementById("00NU7000008w8rp"),
            mailingRadios: document.querySelectorAll('input[name="mailingAddress3"]'),
            mailingHidden: document.getElementById("00NU7000008w6d7"),
            streetNumber: document.getElementById("00NU7000008w6I9"),

            zip: document.getElementById("00NU70000085nmf")
          }
        ];

        function setDisabled(el, disabled) {
          if (!el) return;
          el.disabled = disabled;
          el.classList.toggle("disabled-field", disabled);
        }

        function syncHiddenCheckbox(cb, hidden) {
          if (hidden) hidden.value = cb && cb.checked ? "Y" : "N";
        }

        function syncMailing(block) {
          const checked = [...block.mailingRadios].find(r => r.checked);
          if (block.mailingHidden) block.mailingHidden.value = checked ? checked.value : "";
        }

        function clearIfDisabled(el, disabled) {
          if (el && disabled) el.value = "";
        }

        function updateBlockState(block) {
          const active = Number(addMortgageCount.value) >= block.idx;
          block.wrapper.classList.toggle("hidden", !active);

          if (!active) {
            if (block.escrowCheckbox) block.escrowCheckbox.checked = false;
            if (block.atimaCheckbox) block.atimaCheckbox.checked = false;
            if (block.isaoaCheckbox) block.isaoaCheckbox.checked = false;
            if (block.mailingRadios) block.mailingRadios.forEach(r => r.checked = false);
            [
              block.streetNumber, block.streetName, block.apt, block.poBox,
              block.city, block.state, block.zip
            ].forEach(el => { if (el) el.value = ""; });
            syncHiddenCheckbox(block.escrowCheckbox, block.escrowHidden);
            syncHiddenCheckbox(block.atimaCheckbox, block.atimaHidden);
            syncHiddenCheckbox(block.isaoaCheckbox, block.isaoaHidden);
            syncMailing(block);
            return;
          }

          const mailingVal = [...block.mailingRadios].find(r => r.checked)?.value || "";
          const isPO = mailingVal === "Y";
          const isNo = mailingVal === "N";

          syncHiddenCheckbox(block.escrowCheckbox, block.escrowHidden);
          syncHiddenCheckbox(block.atimaCheckbox, block.atimaHidden);
          syncHiddenCheckbox(block.isaoaCheckbox, block.isaoaHidden);
          syncMailing(block);

          setDisabled(block.streetNumber, isPO);
          setDisabled(block.streetName, isPO);
          setDisabled(block.poBox, isNo);
          setDisabled(block.apt, isPO);
          setDisabled(block.city, false);
          setDisabled(block.state, false);
          setDisabled(block.zip, false);

          block.streetNumber.required = isNo;
          block.streetName.required = isNo;
          block.poBox.required = isPO;
          block.city.required = true;
          block.state.required = true;
          block.zip.required = true;
          block.apt.required = false;

          clearIfDisabled(block.streetNumber, isPO);
          clearIfDisabled(block.streetName, isPO);
          clearIfDisabled(block.poBox, isNo);
        }

        function updateAllMortgageBlocks() {
          const count = addMortgageCount.value;
          addMortgageFields.classList.toggle("hidden", count === "");
          blocks.forEach(updateBlockState);
        }

        addMortgageCount.addEventListener("change", updateAllMortgageBlocks);
        blocks.forEach(block => {
          if (block.escrowCheckbox) block.escrowCheckbox.addEventListener("change", () => syncHiddenCheckbox(block.escrowCheckbox, block.escrowHidden));
          if (block.atimaCheckbox) block.atimaCheckbox.addEventListener("change", () => syncHiddenCheckbox(block.atimaCheckbox, block.atimaHidden));
          if (block.isaoaCheckbox) block.isaoaCheckbox.addEventListener("change", () => syncHiddenCheckbox(block.isaoaCheckbox, block.isaoaHidden));
          if (block.mailingRadios) block.mailingRadios.forEach(r => r.addEventListener("change", () => { syncMailing(block); updateBlockState(block); }));
          [block.streetNumber, block.streetName, block.apt, block.poBox, block.city, block.state, block.zip].forEach(el => {
            if (el) el.addEventListener("input", () => updateBlockState(block));
            if (el && el.tagName === "SELECT") el.addEventListener("change", () => updateBlockState(block));
          });
        });
        updateAllMortgageBlocks();

        const reviewBtn = document.getElementById("reviewBtn");
        const dialog = document.getElementById("dialog");
        const dialogTitle = document.getElementById("dialogTitle");
        const missingFieldsList = document.getElementById("missingFieldsList");
        const proceedBtn = document.getElementById("proceedBtn");
        const editBtn = document.getElementById("editBtn");
        const form = document.getElementById("mainForm");
        const allFormDataTextarea = document.getElementById("00NU7000008TS4L");

        function formatDateForJSON(dateString) {
          if (!dateString) return "";
          const [m, d, y] = dateString.split("/");
          return `${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
        }

        function captureAllFormDataAsJSON() {
          const formData = {};
          const formElements = form.querySelectorAll("input, textarea, select");

          formElements.forEach(element => {
            if (
              !element.name ||
              element.name === "Form_Captured_Data__c" ||
              element.name === "Form_Missing_Data__c" ||
              element.name === "All_Form_Data__c" ||
              element.name === "requestTypeRadios"
            ) return;

            const skipFields = ["company", "delete_Action_Form", "lead_source", "phone", "status", "last_name", "first_name", "retURL", "oid"];
            let fieldName = element.name.replace(/__c$/, "");
            if (skipFields.includes(fieldName)) return;

            const fieldMapping = {
              "00NU7000005zuNN": "Policy_Action",
              "Policy_Number": "Policy_Number",
              "Carrier": "Carrier",
              "Is_this_a_quote_or_a_change_request": "Is_this_a_quote_or_a_change_request",
              "Date": "Effective_Date",
              "email": "Email"
            };

            fieldName = fieldMapping[fieldName] || fieldName;

            if (element.type === "checkbox") {
              formData[fieldName] = element.checked ? "Y" : "N";
            } else if (fieldName === "Effective_Date" && element.value) {
              formData[fieldName] = formatDateForJSON(element.value);
            } else {
              formData[fieldName] = element.value || "";
            }
          });

          return JSON.stringify(formData, null, 2);
        }

        function collectMissingFields() {
          const missing = [];

          const email = document.getElementById("email");
          if (!email.value.trim() || !email.checkValidity()) missing.push("Email");

          if (![...document.querySelectorAll('input[name="requestTypeRadios"]')].some(r => r.checked)) missing.push("Select the Request Type:");
          if (!document.getElementById("00NU7000005zuX3").value.trim()) missing.push("Policy Number");
          const d = document.getElementById("00NU7000005zuLl").value.trim();
          if (!/^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/(19|20)\d{2}$/.test(d)) missing.push("Effective Date (MM/DD/YYYY)");
          if (!document.getElementById("mortgageeDeleteCount").value) missing.push("Please select the number of mortgagee you want to delete:");

          const addCount = Number(document.getElementById("addMortgageCount").value || 0);
          for (let i = 0; i < addCount; i++) {
            const block = blocks[i];
            const prefix = `Add Mortgage ${block.idx}`;
            const mailingVal = [...block.mailingRadios].find(r => r.checked)?.value || "";
            const isPO = mailingVal === "Y";
            const isNo = mailingVal === "N";

            if (!block.streetNumber.value.trim() && isNo) missing.push(`${prefix}: Street Number`);
            if (!block.streetName.value.trim() && isNo) missing.push(`${prefix}: Street Name`);
            if (!block.poBox.value.trim() && isPO) missing.push(`${prefix}: PO Box Address`);
            if (!block.city.value.trim()) missing.push(`${prefix}: City`);
            if (!block.state.value.trim()) missing.push(`${prefix}: State`);
            if (!block.zip.value.trim()) missing.push(`${prefix}: Zip Code`);
            if (!block.mailingHidden.value) missing.push(`${prefix}: Is your mailing address a PO BOX address?`);
            if (!block.escrowHidden.value) missing.push(`${prefix}: Is this an Escrow Account?`);
            if (!block.atimaHidden.value) missing.push(`${prefix}: ATIMA`);
            if (!block.isaoaHidden.value) missing.push(`${prefix}: ISAOA`);
            const loanIds = [null, "00NU70000074ACr", "00NU70000074AXp", "00NU70000074B5h"];
            const nameIds = [null, "00NU70000074A4n", "00NU70000074APl", "00NU70000074Axd"];
            if (!document.getElementById(loanIds[block.idx]).value.trim()) missing.push(`${prefix}: Loan Number`);
            if (!document.getElementById(nameIds[block.idx]).value.trim()) missing.push(`${prefix}: Name 1`);
          }

          return missing;
        }

        function captureFormData() {
          if (picker && picker.getDate()) dateInput.value = picker.toString();

          const missing = [];
          const filled = [];

          const addCount = Number(addMortgageCount.value || 0);

          const addIfFilled = (label, el) => {
            if (!el || !el.value.trim()) missing.push(label);
            else filled.push(`${label}: ${el.value.trim()}`);
          };

          addIfFilled("Email", document.getElementById("email"));
          const req = document.querySelector('input[name="requestTypeRadios"]:checked');
          if (req) filled.push(`Select the Request Type:: ${req.value}`); else missing.push("Select the Request Type:");
          addIfFilled("Policy Number", document.getElementById("00NU7000005zuX3"));
          addIfFilled("Effective Date (MM/DD/YYYY)", document.getElementById("00NU7000005zuLl"));
          addIfFilled("Please select the number of mortgagee you want to delete:", document.getElementById("mortgageeDeleteCount"));
          addIfFilled("Please select the number of Mortgagee Details you want to Add:", document.getElementById("addMortgageCount"));

          for (let i = 0; i < addCount; i++) {
            const block = blocks[i];
            const prefix = `Add Mortgage ${block.idx}`;
            const mailingVal = [...block.mailingRadios].find(r => r.checked)?.value || "";

            if (block.escrowHidden) filled.push(`${prefix}: Is this an Escrow Account?: ${block.escrowHidden.value || ""}`);
            if (block.atimaHidden) filled.push(`${prefix}: ATIMA: ${block.atimaHidden.value || ""}`);
            if (block.isaoaHidden) filled.push(`${prefix}: ISAOA: ${block.isaoaHidden.value || ""}`);
            if (block.mailingHidden) filled.push(`${prefix}: Is your mailing address a PO BOX address?: ${mailingVal}`);

            if (mailingVal === "Y") {
              addIfFilled(`${prefix}: PO Box Address`, block.poBox);
              filled.push(`${prefix}: Street Number:`);
              filled.push(`${prefix}: Street Name:`);
            } else if (mailingVal === "N") {
              addIfFilled(`${prefix}: Street Number`, block.streetNumber);
              addIfFilled(`${prefix}: Street Name`, block.streetName);
              filled.push(`${prefix}: PO Box Address:`);
            }

            if (block.apt && block.apt.value.trim()) filled.push(`${prefix}: Apartment/Suite: ${block.apt.value.trim()}`);
            addIfFilled(`${prefix}: City`, block.city);
            addIfFilled(`${prefix}: State`, block.state);
            addIfFilled(`${prefix}: Zip Code`, block.zip);

            const loanIds = [null, "00NU70000074ACr", "00NU70000074AXp", "00NU70000074B5h"];
            const nameIds = [null, "00NU70000074A4n", "00NU70000074APl", "00NU70000074Axd"];
            addIfFilled(`${prefix}: Loan Number`, document.getElementById(loanIds[block.idx]));
            addIfFilled(`${prefix}: Name 1`, document.getElementById(nameIds[block.idx]));
          }

          let missingField = document.getElementById("Form_Missing_Data__c");
          let capturedField = document.getElementById("Form_Captured_Data__c");

          if (!missingField) {
            missingField = document.createElement("input");
            missingField.type = "hidden";
            missingField.id = "Form_Missing_Data__c";
            missingField.name = "Form_Missing_Data__c";
            form.appendChild(missingField);
          }

          if (!capturedField) {
            capturedField = document.createElement("input");
            capturedField.type = "hidden";
            capturedField.id = "Form_Captured_Data__c";
            capturedField.name = "Form_Captured_Data__c";
            form.appendChild(capturedField);
          }

          missingField.value = missing.join("\n");
          capturedField.value = filled.join("\n");
        }

        reviewBtn.addEventListener("click", () => {
          updateAllMortgageBlocks();
          const missing = collectMissingFields();
          allFormDataTextarea.value = captureAllFormDataAsJSON();

          if (missing.length) {
            dialogTitle.textContent = "Below Mandatory Fields are missing and the Team will contact you shortly.";
            missingFieldsList.innerHTML = missing.map(f => `<li>${f}</li>`).join("");
          } else {
            dialogTitle.textContent = "All mandatory fields are completed. Ready to submit your request?";
            missingFieldsList.innerHTML = "";
          }

          dialog.classList.remove("hidden");
        });

        editBtn.addEventListener("click", () => dialog.classList.add("hidden"));

        proceedBtn.addEventListener("click", () => {
          captureFormData();
          dialog.classList.add("hidden");
          if (picker && picker.getDate()) dateInput.value = picker.toString();
          form.submit();
        });

        window.addEventListener("click", e => {
          if (e.target === dialog) dialog.classList.add("hidden");
        });

        window.addEventListener("keydown", e => {
          if (e.key === "Escape" && !dialog.classList.contains("hidden")) {
            dialog.classList.add("hidden");
          }
        });
      });
    </script>
  </body>
</html>
