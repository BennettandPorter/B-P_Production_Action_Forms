<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cincinnati Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pikaday/css/pikaday.css" />
    <style>
      .star { color: #ef4444; margin-left: 2px; }
      .modal-bg { background: rgba(0,0,0,0.4); }
      .hidden { display: none; }
      .all-form-data {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.4;
      }
      .field-disabled {
        background: #f3f4f6;
        cursor: not-allowed;
      }
      .section-box {
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        padding: 1rem;
        background: #fff;
      }
    </style>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen p-6">
    <form
      id="mainForm"
      action="https://test.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DU700000AcTJN"
      method="POST"
      class="bg-white p-8 rounded-2xl shadow-md w-full max-w-2xl space-y-8"
      autocomplete="off"
      novalidate
    >
      <textarea
        id="00NU7000008TS4L"
        name="All_Form_Data__c"
        rows="50"
        type="text"
        wrap="soft"
        class="hidden all-form-data"
      ></textarea>

      <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Update Address Cincinnati Form
      </h2>

      <section class="bg-gray-50 border rounded-xl p-6 shadow-inner space-y-6" aria-label="Policy Changes Section">
        <h3 class="text-xl font-semibold text-gray-700">Policy Changes</h3>

        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700">
            Email<span class="star">*</span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
            autocomplete="off"
            required
          />
        </div>

        <fieldset class="mb-4">
          <legend class="block text-sm font-medium text-gray-700 mb-1">
            Select the Request Type:<span class="star">*</span>
          </legend>
          <div class="flex space-x-6">
            <label class="inline-flex items-center">
              <input type="radio" name="requestTypeRadios" value="Quote" class="mr-2" required />Quote
            </label>
            <label class="inline-flex items-center">
              <input type="radio" name="requestTypeRadios" value="Endorsement" class="mr-2" required />Endorsement
            </label>
          </div>
          <select id="00NU7000006IOzh" name="Is_this_a_quote_or_a_change_request__c" class="hidden" required>
            <option value=""></option>
            <option value="Quote">Quote</option>
            <option value="Endorsement">Endorsement</option>
          </select>
        </fieldset>

        <div class="mb-4">
          <label for="00NU7000005zuX3" class="block text-sm font-medium text-gray-700">
            Policy Number<span class="star">*</span>
          </label>
          <input
            type="text"
            id="00NU7000005zuX3"
            name="Policy_Number__c"
            class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm"
            autocomplete="off"
            required
          />
        </div>

        <div class="mb-4">
          <label for="00NU7000005zuLl" class="block text-sm font-medium text-gray-700">
            Effective Date (MM/DD/YYYY)<span class="star">*</span>
          </label>
          <input
            type="text"
            id="00NU7000005zuLl"
            name="Date__c"
            placeholder="MM/DD/YYYY"
            maxlength="10"
            class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 date-input"
            autocomplete="off"
            required
          />
        </div>
      </section>

      <section class="bg-gray-50 border rounded-xl p-6 shadow-inner space-y-6" aria-label="Address Change Section">
        <h3 class="text-xl font-semibold text-gray-700">Address Change</h3>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Do you want to change the garaging address to your new mailing address?<span class="star">*</span>
          </label>
          <div class="flex space-x-6">
            <label class="inline-flex items-center">
              <input type="radio" name="changeGaragingAddressRadio" value="Y" class="mr-2" />Yes
            </label>
            <label class="inline-flex items-center">
              <input type="radio" name="changeGaragingAddressRadio" value="N" class="mr-2" />No
            </label>
          </div>
          <select id="00NU7000007xdan" name="IfChangeGaragingAddress__c" title="IfChangeGaragingAddress" class="hidden">
            <option value="">--None--</option>
            <option value="Y">Y</option>
            <option value="N">N</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Is your mailing address a PO BOX address?<span class="star">*</span>
          </label>
          <div class="flex space-x-6">
            <label class="inline-flex items-center">
              <input type="radio" name="poBoxRadio" value="Y" class="mr-2" />Yes
            </label>
            <label class="inline-flex items-center">
              <input type="radio" name="poBoxRadio" value="N" class="mr-2" />No
            </label>
          </div>
          <select id="00NU7000007xdVx" name="Do_you_want_to_change_mailing_address__c" title="Do you want to change mailing address ?" class="hidden">
            <option value="">--None--</option>
            <option value="Y">Y</option>
            <option value="N">N</option>
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="00NU7000007yPVl" class="block text-sm font-medium text-gray-700">
              State<span class="star">*</span>
            </label>
            <select id="00NU7000007yPVl" name="AutoOwners_State__c" title="AutoOwners State" class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm" required>
              <option value="">--None--</option>
              <option value="AK">AK</option><option value="AL">AL</option><option value="AR">AR</option><option value="AZ">AZ</option><option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DC">DC</option><option value="DE">DE</option><option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option><option value="IA">IA</option><option value="ID">ID</option><option value="IL">IL</option><option value="IN">IN</option><option value="KS">KS</option><option value="KY">KY</option><option value="LA">LA</option><option value="MA">MA</option><option value="MD">MD</option><option value="ME">ME</option><option value="MI">MI</option><option value="MN">MN</option><option value="MO">MO</option><option value="MS">MS</option><option value="MT">MT</option><option value="NC">NC</option><option value="ND">ND</option><option value="NE">NE</option><option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option><option value="NV">NV</option><option value="NY">NY</option><option value="OH">OH</option><option value="OK">OK</option><option value="OR">OR</option><option value="PA">PA</option><option value="RI">RI</option><option value="SC">SC</option><option value="SD">SD</option><option value="TN">TN</option><option value="TX">TX</option><option value="UT">UT</option><option value="VA">VA</option><option value="VT">VT</option><option value="WA">WA</option><option value="WI">WI</option><option value="WV">WV</option><option value="WY">WY</option><option value="CW">CW</option><option value="PR">PR</option><option value="AS">AS</option><option value="FM">FM</option><option value="GU">GU</option><option value="MH">MH</option><option value="MP">MP</option><option value="PW">PW</option><option value="VI">VI</option><option value="AE">AE</option><option value="AP">AP</option><option value="AA">AA</option><option value="Non-US">Non-US</option>
            </select>
          </div>

          <div>
            <label for="00NU7000005zvUj" class="block text-sm font-medium text-gray-700">
              City<span class="star">*</span>
            </label>
            <input id="00NU7000005zvUj" maxlength="30" name="City__c" type="text" class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm" required />
          </div>

          <div>
            <label for="00NU7000006cbfp" class="block text-sm font-medium text-gray-700">
              Zip Code<span class="star">*</span>
            </label>
            <input id="00NU7000006cbfp" maxlength="30" name="Interest_Zip_Code__c" type="text" class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm" required />
          </div>

          <div>
            <label for="00NU7000008o0JZ" class="block text-sm font-medium text-gray-700">
              Street Number<span id="streetNumberStar" class="star">*</span>
            </label>
            <input id="00NU7000008o0JZ" maxlength="255" name="Street_Number__c" type="text" class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm" />
          </div>

          <div>
            <label for="00NU7000008o0OP" class="block text-sm font-medium text-gray-700">
              Street Name<span id="streetNameStar" class="star">*</span>
            </label>
            <input id="00NU7000008o0OP" maxlength="255" name="Street_Name__c" type="text" class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm" />
          </div>

          <div>
            <label for="00NU7000008oBZx" class="block text-sm font-medium text-gray-700">
              Apartment/Suite
            </label>
            <input id="00NU7000008oBZx" maxlength="255" name="Apartment_Suite__c" type="text" class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm" />
          </div>

          <div>
            <label for="00NU700000619U1" class="block text-sm font-medium text-gray-700">
              PO Box Address<span id="poBoxStar" class="star hidden">*</span>
            </label>
            <input id="00NU700000619U1" maxlength="255" name="LenderMortgage_address__c" type="text" class="mt-1 w-full p-2 border border-gray-300 rounded-lg shadow-sm" />
          </div>
        </div>
      </section>

      <input type="hidden" name="oid" value="00DU700000AcTJN" />
      <input type="hidden" name="retURL" value="https://bennettandporter.com/" />
      <input type="hidden" name="first_name" value="Cincinnati" />
      <input type="hidden" name="last_name" value="Update Address" />
      <input type="hidden" name="status" value="New" />
      <input type="hidden" name="phone" value="28138916529" />
      <input type="hidden" name="lead_source" value="Web Form" />
      <input type="hidden" name="delete_Action_Form__c" value="1" />
      <input type="hidden" id="00NU7000007OdKL" name="Carrier__c" value="Cincinnati" />
      <input type="hidden" name="Policy_Action__c" id="00NU7000005zuNN" value="Update Address" />
      <input type="hidden" name="Form_Captured_Data__c" />
      <input type="hidden" name="Form_Missing_Data__c" />
      <input type="hidden" name="company" value="Cincinnati" />

      <div class="flex justify-end mt-6">
        <button
          type="button"
          id="reviewBtn"
          class="bg-blue-600 text-white font-semibold py-2 px-4 rounded-xl hover:bg-blue-700 transition"
        >
          Review and Submit
        </button>
      </div>
    </form>

    <div
      id="dialog"
      class="hidden fixed inset-0 flex items-center justify-center modal-bg z-50"
      role="dialog"
      aria-modal="true"
      aria-labelledby="dialogTitle"
    >
      <div class="bg-white rounded-lg p-6 max-w-md w-full shadow-lg text-gray-800">
        <h3 id="dialogTitle" class="text-lg font-semibold mb-4"></h3>
        <ul id="missingFieldsList" class="mb-4 text-red-600 text-sm"></ul>
        <div class="flex justify-end space-x-3" id="dialogButtons">
          <button
            id="proceedBtn"
            class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 font-medium"
          >
            Proceed to End Request
          </button>
          <button
            id="editBtn"
            class="bg-gray-300 text-gray-800 px-4 py-2 rounded hover:bg-gray-400 font-medium"
          >
            Edit
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pikaday/pikaday.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        let picker = null;

        const form = document.getElementById("mainForm");
        const dateInput = document.getElementById("00NU7000005zuLl");
        const reviewBtn = document.getElementById("reviewBtn");
        const dialog = document.getElementById("dialog");
        const dialogTitle = document.getElementById("dialogTitle");
        const missingFieldsList = document.getElementById("missingFieldsList");
        const proceedBtn = document.getElementById("proceedBtn");
        const editBtn = document.getElementById("editBtn");
        const allFormDataTextarea = document.getElementById("00NU7000008TS4L");

        const hiddenSelect = document.getElementById("00NU7000006IOzh");
        const changeGaragingHidden = document.getElementById("00NU7000007xdan");
        const mailingPoBoxHidden = document.getElementById("00NU7000007xdVx");

        const changeGaragingRadios = document.querySelectorAll('input[name="changeGaragingAddressRadio"]');
        const poBoxRadios = document.querySelectorAll('input[name="poBoxRadio"]');

        const stateEl = document.getElementById("00NU7000007yPVl");
        const cityEl = document.getElementById("00NU7000005zvUj");
        const zipEl = document.getElementById("00NU7000006cbfp");
        const streetNumberEl = document.getElementById("00NU7000008o0JZ");
        const streetNameEl = document.getElementById("00NU7000008o0OP");
        const apartmentEl = document.getElementById("00NU7000008oBZx");
        const poBoxEl = document.getElementById("00NU700000619U1");
        const streetNumberStar = document.getElementById("streetNumberStar");
        const streetNameStar = document.getElementById("streetNameStar");
        const poBoxStar = document.getElementById("poBoxStar");

        if (window.Pikaday && dateInput) {
          picker = new Pikaday({
            field: dateInput,
            format: "MM/DD/YYYY",
            toString(date) {
              const d = String(date.getDate()).padStart(2, "0");
              const m = String(date.getMonth() + 1).padStart(2, "0");
              const y = date.getFullYear();
              return `${m}/${d}/${y}`;
            },
            parse(dateString) {
              if (!dateString) return null;
              const [m, d, y] = dateString.split("/");
              return new Date(y, m - 1, d);
            },
            onSelect: function () {
              dateInput.value = this.toString();
            },
            onClose: function () {
              if (this.getDate()) dateInput.value = this.toString();
            }
          });
        }

        function syncRequestType() {
          const checkedRadio = document.querySelector('input[name="requestTypeRadios"]:checked');
          hiddenSelect.value = checkedRadio ? checkedRadio.value : "";
        }

        function syncChangeGaraging() {
          const checked = document.querySelector('input[name="changeGaragingAddressRadio"]:checked');
          changeGaragingHidden.value = checked ? checked.value : "";
        }

        function syncPoBox() {
          const checked = document.querySelector('input[name="poBoxRadio"]:checked');
          mailingPoBoxHidden.value = checked ? checked.value : "";
        }

        function setRequired(el, required) {
          if (!el) return;
          el.required = required;
          if (required) el.setAttribute("required", "required");
          else el.removeAttribute("required");
        }

        function setDisabled(el, disabled) {
          if (!el) return;
          el.disabled = disabled;
          el.classList.toggle("field-disabled", disabled);
          if (disabled) el.value = "";
        }

        function updateAddressBehavior() {
          const poBoxYes = document.querySelector('input[name="poBoxRadio"]:checked')?.value === "Y";

          if (poBoxYes) {
            setRequired(poBoxEl, true);
            setDisabled(streetNumberEl, true);
            setDisabled(streetNameEl, true);
            setDisabled(apartmentEl, true);
            setDisabled(poBoxEl, false);
            setRequired(streetNumberEl, false);
            setRequired(streetNameEl, false);
            setRequired(apartmentEl, false);
            setRequired(poBoxEl, true);
            poBoxStar.classList.remove("hidden");
            streetNumberStar.classList.add("hidden");
            streetNameStar.classList.add("hidden");
          } else {
            setDisabled(poBoxEl, true);
            setRequired(poBoxEl, false);
            poBoxStar.classList.add("hidden");

            setDisabled(streetNumberEl, false);
            setDisabled(streetNameEl, false);
            setDisabled(apartmentEl, false);
            setRequired(streetNumberEl, true);
            setRequired(streetNameEl, true);
            setRequired(apartmentEl, false);
            streetNumberStar.classList.remove("hidden");
            streetNameStar.classList.remove("hidden");
          }
        }

        changeGaragingRadios.forEach(radio => radio.addEventListener("change", () => {
          syncChangeGaraging();
        }));
        poBoxRadios.forEach(radio => radio.addEventListener("change", () => {
          syncPoBox();
          updateAddressBehavior();
        }));

        document.querySelectorAll('input[name="requestTypeRadios"]').forEach(r => r.addEventListener("change", syncRequestType));
        syncRequestType();
        syncChangeGaraging();
        syncPoBox();
        updateAddressBehavior();

        const requiredFields = [
          { id: "email", label: "Email", type: "email" },
          { radioGroupName: "requestTypeRadios", label: "Select the Request Type:" },
          { id: "00NU7000005zuX3", label: "Policy Number" },
          { id: "00NU7000005zuLl", label: "Effective Date (MM/DD/YYYY)", type: "date" },
          { radioGroupName: "changeGaragingAddressRadio", label: "Do you want to change the garaging address to your new mailing address?" },
          { radioGroupName: "poBoxRadio", label: "Is your mailing address a PO BOX address?" },
          { id: "00NU7000007yPVl", label: "State" },
          { id: "00NU7000005zvUj", label: "City" },
          { id: "00NU7000006cbfp", label: "Zip Code" },
          { id: "00NU7000008o0JZ", label: "Street Number", conditional: true },
          { id: "00NU7000008o0OP", label: "Street Name", conditional: true },
          { id: "00NU700000619U1", label: "PO Box Address", conditional: true }
        ];

        function formatDateForJSON(dateString) {
          if (!dateString) return "";
          const [m, d, y] = dateString.split("/");
          return `${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
        }

        function captureAllFormDataAsJSON() {
          const formData = {};
          const formElements = form.querySelectorAll("input, textarea, select");
          formElements.forEach(element => {
            if (!element.name || ["Form_Captured_Data__c", "Form_Missing_Data__c", "All_Form_Data__c", "requestTypeRadios", "changeGaragingAddressRadio", "poBoxRadio"].includes(element.name)) return;
            if (element.disabled) return;
            let fieldName = element.name.replace(/__c$/, "");
            const skipFields = ["company", "delete_Action_Form", "lead_source", "phone", "status", "last_name", "first_name", "retURL", "oid"];
            if (skipFields.includes(fieldName)) return;
            const fieldMapping = {
              "00NU7000005zuNN": "Policy_Action",
              "Policy_Number": "Policy_Number",
              "Carrier": "Carrier",
              "Is_this_a_quote_or_a_change_request": "Is_this_a_quote_or_a_change_request",
              "Date": "Effective_Date",
              "email": "Email",
              "00NU7000007xdan": "IfChangeGaragingAddress",
              "00NU7000007xdVx": "Do_you_want_to_change_mailing_address",
              "00NU7000007yPVl": "State",
              "00NU7000005zvUj": "City",
              "00NU7000006cbfp": "Zip_Code",
              "00NU7000008o0JZ": "Street_Number",
              "00NU7000008o0OP": "Street_Name",
              "00NU7000008oBZx": "Apartment_Suite",
              "00NU700000619U1": "PO_Box_Address"
            };
            fieldName = fieldMapping[fieldName] || fieldName;
            formData[fieldName] = element.name === "Date__c" && element.value ? formatDateForJSON(element.value) : (element.value || "");
          });
          return JSON.stringify(formData, null, 2);
        }

        function validateFields() {
          const missing = [];
          const poBoxYes = document.querySelector('input[name="poBoxRadio"]:checked')?.value === "Y";
          requiredFields.forEach(field => {
            if (field.radioGroupName) {
              const radios = document.querySelectorAll(`input[name="${field.radioGroupName}"]`);
              const checked = [...radios].some(r => r.checked);
              if (!checked) missing.push(field.label);
              return;
            }
            const el = document.getElementById(field.id);
            if (!el || el.disabled) return;
            if (field.type === "email") {
              if (!el.value.trim() || !el.checkValidity()) missing.push(field.label);
            } else if (field.type === "date") {
              const val = el.value.trim();
              const dateRegex = /^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/(19|20)\d{2}$/;
              if (!val || !dateRegex.test(val)) missing.push(field.label);
            } else if (!el.value.trim()) {
              missing.push(field.label);
            }
          });
          if (poBoxYes) {
            if (!poBoxEl.value.trim()) missing.push("PO Box Address");
          } else {
            if (!streetNumberEl.value.trim()) missing.push("Street Number");
            if (!streetNameEl.value.trim()) missing.push("Street Name");
          }
          return missing;
        }

        function captureFormData() {
          if (picker && picker.getDate()) dateInput.value = picker.toString();
          const missing = [];
          const filled = [];
          const poBoxYes = document.querySelector('input[name="poBoxRadio"]:checked')?.value === "Y";
          requiredFields.forEach(field => {
            if (field.radioGroupName) {
              const radios = document.querySelectorAll(`input[name="${field.radioGroupName}"]`);
              const checked = [...radios].find(r => r.checked);
              if (checked) filled.push(`${field.label}: ${checked.value}`);
              else missing.push(field.label);
              return;
            }
            const el = document.getElementById(field.id);
            if (!el || el.disabled) return;
            if (!el.value.trim()) missing.push(field.label);
            else filled.push(`${field.label}: ${el.value.trim()}`);
          });
          if (poBoxYes) {
            if (poBoxEl.value.trim()) filled.push(`PO Box Address: ${poBoxEl.value.trim()}`);
            else missing.push("PO Box Address");
          } else {
            if (streetNumberEl.value.trim()) filled.push(`Street Number: ${streetNumberEl.value.trim()}`);
            else missing.push("Street Number");
            if (streetNameEl.value.trim()) filled.push(`Street Name: ${streetNameEl.value.trim()}`);
            else missing.push("Street Name");
          }
          let missingField = document.getElementById("Form_Missing_Data__c");
          let capturedField = document.getElementById("Form_Captured_Data__c");
          if (!missingField) {
            missingField = document.createElement("input");
            missingField.type = "hidden";
            missingField.id = "Form_Missing_Data__c";
            missingField.name = "Form_Missing_Data__c";
            form.appendChild(missingField);
          }
          if (!capturedField) {
            capturedField = document.createElement("input");
            capturedField.type = "hidden";
            capturedField.id = "Form_Captured_Data__c";
            capturedField.name = "Form_Captured_Data__c";
            form.appendChild(capturedField);
          }
          missingField.value = missing.join("\n");
          capturedField.value = filled.join("\n");
        }

        reviewBtn.addEventListener("click", () => {
          updateAddressBehavior();
          const missing = validateFields();
          allFormDataTextarea.value = captureAllFormDataAsJSON();
          if (missing.length) {
            dialogTitle.textContent = "Below Mandatory Fields are missing and the Team will contact you shortly.";
            missingFieldsList.innerHTML = missing.map(f => `<li>${f}</li>`).join("");
          } else {
            dialogTitle.textContent = "All mandatory fields are completed. Ready to submit your request?";
            missingFieldsList.innerHTML = "";
          }
          dialog.classList.remove("hidden");
        });

        editBtn.addEventListener("click", () => dialog.classList.add("hidden"));

        proceedBtn.addEventListener("click", () => {
          captureFormData();
          dialog.classList.add("hidden");
          if (picker && picker.getDate()) dateInput.value = picker.toString();
          form.submit();
        });

        window.addEventListener("click", e => { if (e.target === dialog) dialog.classList.add("hidden"); });
        window.addEventListener("keydown", e => { if (e.key === "Escape" && !dialog.classList.contains("hidden")) dialog.classList.add("hidden"); });
      });
    </script>
