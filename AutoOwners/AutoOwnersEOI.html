        function getFieldElement(field) {
          if (field.radioGroupName) return document.querySelector('input[name="' + field.radioGroupName + '"]');
          if (field.id) return document.getElementById(field.id);
          return null;
        }

        function getFieldValue(field) {
          if (field.radioGroupName) {
            const checked = document.querySelector('input[name="' + field.radioGroupName + '"]:checked');
            return checked ? checked.value : "";
          }
          const el = document.getElementById(field.id);
          return el && el.value != null ? el.value.trim() : "";
        }

        function isFieldVisible(field) {
          const el = getFieldElement(field);
          if (!el) return false;
          let node = el;
          while (node && node !== document.body) {
            if (window.getComputedStyle(node).display === "none") return false;
            node = node.parentElement;
          }
          return true;
        }

        function validateField(field) {
          const el = getFieldElement(field);
          if (!el) return null;
          if (!isFieldVisible(field)) return null;

          if (field.radioGroupName) {
            return getFieldValue(field) ? null : field.label;
          }

          if (field.type === "email") {
            if (!getFieldValue(field)) return field.label;
            return el.checkValidity() ? null : field.label;
          }

          if (field.type === "date") {
            const val = getFieldValue(field);
            if (!val) return field.label;
            const dateRegex = /^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/\d{4}$/;
            return dateRegex.test(val) ? null : field.label;
          }

          return getFieldValue(field) ? null : field.label;

       function captureFormAudit() {
  const captured = [];
  const missing = [];

  coreMandatoryFields.forEach((field) => {
    const el =
      document.getElementById(field.id) ||
      document.querySelector(
        'input[name="' + field.radioGroupName + '"]'
      );

    let value = "";

    if (field.radioGroupName) {
      const checked = document.querySelector(
        'input[name="' + field.radioGroupName + '"]:checked'
      );
      value = checked ? checked.value : "";
    } else if (el) {
      value = el.value ? el.value.trim() : "";
    }

    if (value) {
      captured.push(field.label + " = " + value);
    } else {
      missing.push(field.label);
    }
  });

  const numAdd = parseInt(
    getFieldValue({ id: "numMortgageeToAdd" }) || "0",
    10
  );

  for (let i = 1; i <= numAdd; i++) {
    const interestType = document.getElementById(
      i === 1
        ? "00NU70000085iIL"
        : i === 2
        ? "00NU70000085ia5"
        : "00NU70000085igX"
    )?.value;

    addMortgageeFields[i].forEach((f) => {

      // Skip Mortgagee Rank when Additional Interest selected
      if (
        f.label.includes("Mortgagee Rank") &&
        interestType === "Additional Interest"
      ) {
        return;
      }

      // Skip Party Code when Mortgagee selected
      if (
        f.label.includes("Party Code") &&
        interestType === "MortgageeHome Equity Line of Credit"
      ) {
        return;
      }

      const el = document.getElementById(f.id);
      const value = el && el.value ? el.value.trim() : "";

      if (value) {
        captured.push(f.label + " = " + value);
      } else {
        missing.push(f.label);
      }
    });
  }

  capturedInput.value = captured.join("\n");
  missingInput.value = missing.join("\n");
}

            dialogTitle.textContent =
              "Below Mandatory Fields are missing and the Team will contact you shortly.";
            missingFieldsList.innerHTML = missing.map((f) => `<li>${f}</li>`).join("");
          } else {
            dialogTitle.textContent =
              "All mandatory fields are completed. Ready to submit your request?";
            missingFieldsList.innerHTML = "";
          }
          dialog.classList.remove("hidden");
