<script src="https://cdn.jsdelivr.net/npm/pikaday/pikaday.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
const form = document.getElementById("mainForm");

const garagingSection = document.getElementById("garagingLocationsSection");
const locationsContainer = document.getElementById("garagingLocationsContainer");
const addLocationBtn = document.getElementById("addLocationBtn");
const removeLocationBtn = document.getElementById("removeLocationBtn");
const reviewBtn = document.getElementById("reviewBtn");
const dialog = document.getElementById("dialog");
const dialogTitle = document.getElementById("dialogTitle");
const missingFieldsList = document.getElementById("missingFieldsList");
const proceedBtn = document.getElementById("proceedBtn");
const editBtn = document.getElementById("editBtn");
const allFormDataTextarea = document.getElementById("00NU7000008TS4L");

// === PREVENT AUTO-SUBMISSION ===
form.addEventListener('submit', function(e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
});
  
/* ===================== DATE PICKER ===================== */
if (window.Pikaday) {
new Pikaday({
field: document.getElementById("00NU7000005zuLl"),
format: "MM/DD/YYYY",
toString(date) {
const d = String(date.getDate()).padStart(2, "0");
const m = String(date.getMonth() + 1).padStart(2, "0");
const y = date.getFullYear();
return m + "/" + d + "/" + y;
},
parse(dateString) {
const parts = dateString.split("/");
return new Date(parts[2], parts[0] - 1, parts[1]);
},
});
}

/* ===================== DATE FORMAT CONVERSION (MM/DD/YYYY to YYYY-MM-DD) ===================== */
function formatToISO(dateString) {
  var match = dateString.trim().match(/^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/(1[0-9]{3}|2[0-9]{3}|30[0-9]{2})$/);
  if (!match) return "";
  return match[3] + "-" + match[1] + "-" + match[2];
}

/* ===================== RADIO → HIDDEN FIELD SYNCING ===================== */
function syncRadioToHidden(radioName, hiddenId) {
var radios = document.querySelectorAll('input[name="' + radioName + '"]');
var hiddenSelect = document.getElementById(hiddenId);
function sync() {
var checkedRadio = document.querySelector('input[name="' + radioName + '"]:checked');
hiddenSelect.value = checkedRadio ? checkedRadio.value : "";
}
radios.forEach(function(radio) { radio.addEventListener("change", sync); });
sync();
}

// Sync all radio groups
syncRadioToHidden("requestTypeRadios", "00NU7000006IOzh");
syncRadioToHidden("changeMailingAddress", "00NU7000007xdVx");
var sameAsGaragingRadios = document.querySelectorAll('input[name="sameAsGaraging"]');
var sameAsGaragingHidden = document.getElementById("00NU7000007xdan");

function syncSameAsGaraging() {
  var checked = document.querySelector('input[name="sameAsGaraging"]:checked');
  if (!checked) {
    sameAsGaragingHidden.value = "";
    return;
  }
  // INVERT VALUE
  sameAsGaragingHidden.value = checked.value === "Y" ? "N" : "Y";
}

sameAsGaragingRadios.forEach(function(r) { r.addEventListener("change", syncSameAsGaraging); });
syncSameAsGaraging();

/* ===================== FIELD CLEARING FUNCTION ===================== */
function clearLocationFields(locationNum) {
var locationDiv = locationsContainer.querySelector('[data-location="' + locationNum + '"]');
if (locationDiv) {
  var inputs = locationDiv.querySelectorAll('input[type="text"], input[type="email"], select');
  inputs.forEach(function(input) {
    input.value = '';
  });
}
}

/* ===================== SECTION LOGIC ===================== */
document.querySelectorAll('input[name="changeMailingAddress"]').forEach(function(radio) {
radio.addEventListener("change", function() {
mailingSection.classList.toggle("hidden", this.value !== "Y");
});
});

document.querySelectorAll('input[name="sameAsGaraging"]').forEach(function(radio) {
  radio.addEventListener("change", function () {
    if (this.value === "N") {
      garagingSection.classList.remove("hidden");
      var firstLocation = locationsContainer.querySelector('[data-location="1"]');
      if (firstLocation) firstLocation.classList.remove("hidden");
      currentLocations = 1;
      removeLocationBtn.disabled = true;
      addLocationBtn.disabled = false;
      addLocationBtn.textContent = "Add Location";
    } else if (this.value === "Y") {
      garagingSection.classList.add("hidden");
      clearLocationFields(1);
      for (var i = 1; i <= maxLocations; i++) {
        var locationDiv = locationsContainer.querySelector('[data-location="' + i + '"]');
        if (locationDiv) {
          locationDiv.classList.add("hidden");
          var inputs = locationDiv.querySelectorAll("input, select");
          inputs.forEach(function(input) {
            input.value = "";
          });
        }
        var fieldId = locationFieldIds[i];
        var field = document.getElementById(fieldId);
        if (field) field.value = "N";
      }
      currentLocations = 1;
      addLocationBtn.disabled = false;
      addLocationBtn.textContent = "Add Location";
      removeLocationBtn.disabled = true;
    }
    updateGaragingFields();
  });
});

/* ===================== GARAGING LOCATIONS MANAGEMENT ===================== */
var currentLocations = 1;
var maxLocations = 6;
var locationFieldIds = {
1: '00NU7000007xdm5',
2: '00NU7000007xdsX',
3: '00NU7000007xdyz',
4: '00NU7000007xe5R',
5: '00NU7000007xeGj',
6: '00NU7000007xeIL'
};

function updateGaragingFields() {
var sameAsGaraging = document.querySelector('input[name="sameAsGaraging"]:checked');
if (sameAsGaraging && sameAsGaraging.value === "N") {
for (var i = 1; i <= maxLocations; i++) {
var fieldId = locationFieldIds[i];
var field = document.getElementById(fieldId);
var locationDiv = locationsContainer.querySelector('[data-location="' + i + '"]');
if (field) {
field.value = locationDiv && !locationDiv.classList.contains('hidden') ? 'Y' : 'N';
}
}
} else {
for (var i = 1; i <= maxLocations; i++) {
var fieldId = locationFieldIds[i];
var field = document.getElementById(fieldId);
if (field) field.value = 'N';
}
}
}

addLocationBtn.addEventListener("click", function() {
if (currentLocations < maxLocations) {
currentLocations++;
var locationDiv = locationsContainer.querySelector('[data-location="' + currentLocations + '"]');
if (locationDiv) {
locationDiv.classList.remove("hidden");
}
updateGaragingFields();
removeLocationBtn.disabled = false;
if (currentLocations === maxLocations) {
addLocationBtn.disabled = true;
addLocationBtn.textContent = "Max Locations Reached";
}
}
});

removeLocationBtn.addEventListener("click", function() {
if (currentLocations > 1) {
var locationDiv = locationsContainer.querySelector('[data-location="' + currentLocations + '"]');
if (locationDiv) {
locationDiv.classList.add("hidden");
}
currentLocations--;
updateGaragingFields();
addLocationBtn.disabled = false;
addLocationBtn.textContent = "Add Location";
if (currentLocations === 1) {
removeLocationBtn.disabled = true;
}
}
});

var requiredFields = [
{ id: "email", label: "Email", type: "email" },
{ radioGroupName: "requestTypeRadios", label: "Select the Request Type:" },
{ id: "00NU7000005zuX3", label: "Policy Number" },
{ id: "00NU7000005zuLl", label: "Effective Date (MM/DD/YYYY)", type: "date" },
{ radioGroupName: "changeMailingAddress", label: "Change mailing address selection" },
{ radioGroupName: "sameAsGaraging", label: "Garaging address selection" }
];

/* ===================== VALIDATION ===================== */
function validateFields() {
var missing = [];
requiredFields.forEach(function(field) {
if (field.radioGroupName) {
var radios = document.querySelectorAll('input[name="' + field.radioGroupName + '"]');
var checked = Array.prototype.slice.call(radios).some(function(r) { return r.checked; });
if (!checked) missing.push(field.label);
return;
}
var el = document.getElementById(field.id);
if (!el) return;
if (field.type === "email") {
if (!el.value.trim() || !el.checkValidity()) missing.push(field.label);
} else if (field.type === "date") {
var val = el.value.trim();
var dateRegex = /^(0[1-9]|1[0-2])\/(0[1-9]|[12][0-9]|3[01])\/(1[0-9]{3}|2[0-9]{3}|30[0-9]{2})$/;
if (!val || !dateRegex.test(val)) missing.push(field.label);
} else {
if (!el.value.trim()) missing.push(field.label);
}
});

if (!mailingSection.classList.contains('hidden')) {
  var mailingRequired = mailingSection.querySelectorAll('input[required], select[required]');
  mailingRequired.forEach(function(input) {
    if (!input.value.trim()) {
      var labelEl = input.previousElementSibling;
      var label = labelEl ? labelEl.textContent.replace("*", "").trim() : "Field";
      missing.push("Mailing Address - " + label);
    }
  });
}
  
if (!garagingSection.classList.contains('hidden')) {
  for (var i = 1; i <= currentLocations; i++) {
    var locationDiv = locationsContainer.querySelector('[data-location="' + i + '"]');
    if (locationDiv && !locationDiv.classList.contains('hidden')) {
      var requiredInputs = locationDiv.querySelectorAll('input[required], select[required]');
      requiredInputs.forEach(function(input) {
        if (!input.value.trim()) {
          var labelEl = input.previousElementSibling;
          var label = labelEl ? labelEl.textContent.replace("*", "").trim() : "Field";
          missing.push("Location " + i + " - " + label);
        }
      });
    }
  }
}
return missing;
}

  var excludeFields = [
    "oid", "OrgId", "retURL", "ReturnURL", "first_name", "FirstName",
    "last_name", "LastName", "status", "Status", "phone", "Phone",

  ];

    "00NU7000006qtOL": "Address_Line_1_GL",

    "00NU7000006qtcr": "City_1_GL",

    "00NU7000006qtZd": "Zip_Code_1_GL",
    "00NU7000007xdm5": "changeGaragingAddressVehicle1",
    "00NU7000007xebh": "Vehicle_Year_2",
    "00NU7000007xerp": "Vehicle_Name_2",
    "00NU7000006qtTB": "Address_Line_2_GL",
    "00NU7000006qthh": "Address_Line_2_2_GL",
    "00NU7000006qsRW": "City_2_GL",
    "00NU7000007xgDh": "GaragingStateVehicle2",

    "00NU7000007xeIL": "changeGaragingAddressVehicle6"
  };
  
  var formElements = form.querySelectorAll("input, textarea, select");
  formElements.forEach(function(element) {
    if (!element.name || element.name === "Form_Captured_Data__c" || element.name === "Form_Missing_Data__c" || element.name === "All_Form_Data__c") return;
   var mappedName =
  fieldMapping[element.id] ||
  fieldMapping[element.name] ||
  element.name.replace(/__c$/, "");
    if (excludeFields.indexOf(mappedName) !== -1 || excludeFields.indexOf(element.name) !== -1) return;
    if (mappedName === "Effective_Date") {
      formData[mappedName] = formatToISO(element.value || "");
    } else {
      formData[mappedName] = element.value || "";
    }
  });
  return JSON.stringify(formData, null, 2);
}

/* ===================== FORM CAPTURE ===================== */
function captureFormData() {
var missing = [];
var filled = [];

requiredFields.forEach(function(field) {
if (field.radioGroupName) {
var radios = document.querySelectorAll('input[name="' + field.radioGroupName + '"]');
var checked = Array.prototype.slice.call(radios).find(function(r) { return r.checked; });
if (checked) {
var label = field.label;
var value = checked.value;
filled.push(label + " = " + value);
} else {
missing.push(field.label);
}
return;
}

var el = document.getElementById(field.id);
if (!el || !el.value.trim()) {
missing.push(field.label);
} else {
filled.push(field.label + " = " + el.value.trim());
}
});

if (!mailingSection.classList.contains("hidden")) {
  var mailingRequired = mailingSection.querySelectorAll('input[required], select[required]');
  mailingRequired.forEach(function(input) {
    var labelEl = input.previousElementSibling;
    var label = labelEl ? labelEl.textContent.replace("*", "").trim() : "Field";
    if (!input.value.trim()) {
      missing.push("Mailing Address - " + label);
    } else {
      filled.push("Mailing Address - " + label + " = " + input.value.trim());
    }
  });
}

for (var i = 1; i <= currentLocations; i++) {
var locationDiv = locationsContainer.querySelector('[data-location="' + i + '"]');
if (locationDiv && !locationDiv.classList.contains("hidden")) {
var requiredInputs = locationDiv.querySelectorAll('input[required], select[required]');
requiredInputs.forEach(function(input) {
var labelEl = input.previousElementSibling;
var label = labelEl ? labelEl.textContent.replace("*", "").trim() : "Field";
if (!input.value.trim()) {
missing.push("Location " + i + " - " + label);
} else {
filled.push("Location " + i + " - " + label + " = " + input.value.trim());
}
});
}
}

var missingField = document.getElementById("Form_Missing_Data__c");
var capturedField = document.getElementById("Form_Captured_Data__c");

if (!missingField) {
missingField = document.createElement("input");
missingField.type = "hidden";
missingField.id = "Form_Missing_Data__c";
missingField.name = "Form_Missing_Data__c";
form.appendChild(missingField);
}

if (!capturedField) {
capturedField = document.createElement("input");
capturedField.type = "hidden";
capturedField.id = "Form_Captured_Data__c";
capturedField.name = "Form_Captured_Data__c";
form.appendChild(capturedField);
}

missingField.value = missing.join("\n");
capturedField.value = filled.join("\n");
updateGaragingFields();
}

/* ===================== UI FLOW ===================== */
reviewBtn.addEventListener("click", function() {
var missing = validateFields();
captureFormData();
allFormDataTextarea.value = captureAllFormDataAsJSON();

if (missing.length) {
dialogTitle.textContent = "Below Mandatory Fields are missing and the Team will contact you shortly.";
missingFieldsList.innerHTML = missing.map(function(f) { return "<li>" + f + "</li>"; }).join("");
} else {
dialogTitle.textContent = "All mandatory fields are completed. Ready to submit your request?";
missingFieldsList.innerHTML = "";
}
dialog.classList.remove("hidden");
});

editBtn.addEventListener("click", function() { dialog.classList.add("hidden"); });

proceedBtn.addEventListener("click", function() {
captureFormData();
allFormDataTextarea.value = captureAllFormDataAsJSON();
dialog.classList.add("hidden");
form.submit();
});

window.addEventListener("click", function(e) {
if (e.target === dialog) dialog.classList.add("hidden");
});

window.addEventListener("keydown", function(e) {
if (e.key === "Escape" && !dialog.classList.contains("hidden")) {
dialog.classList.add("hidden");
}
});
});
</script>
